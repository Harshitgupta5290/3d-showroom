<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hand-Reactive Particles</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg-overlay: rgba(15, 23, 42, 0.85);
            --text: #e2e8f0;
            --font-stack: system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: var(--font-stack);
            color: var(--text);
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Video hidden, used for MediaPipe processing */
        #input-video {
            display: none;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 260px;
            z-index: 10;
            background: var(--bg-overlay);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s;
        }

        h2 {
            font-size: 1.1rem;
            margin: 0 0 15px 0;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
            display: inline-block;
        }

        .section {
            margin-bottom: 20px;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 8px;
            display: block;
            font-weight: 700;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        /* Color Picker */
        .color-row {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: none;
            cursor: pointer;
            margin-right: 10px;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;
        }

        .status {
            font-size: 0.7rem;
            margin-top: 15px;
            display: flex;
            align-items: center;
            color: #64748b;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            margin-right: 8px;
            box-shadow: 0 0 5px #ef4444;
            transition: background 0.3s;
        }

        .indicator.active {
            background: #22c55e;
            box-shadow: 0 0 5px #22c55e;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--primary);
            font-size: 1.2rem;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 242, 255, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            #ui-layer {
                width: auto;
                left: 10px;
                right: 10px;
                bottom: 20px;
                top: auto;
            }
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <div>Loading Interactive Particles...</div>
    </div>

    <video id="input-video" playsinline></video>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <h2>Flux Particles</h2>

        <div class="section">
            <span class="label">Templates</span>
            <div class="grid-buttons" id="btn-container">
                <button data-shape="fireworks" class="active">Fireworks</button>
                <button data-shape="heart">Heart</button>
                <button data-shape="flower">Flower</button>
                <button data-shape="saturn">Saturn</button>
                <button data-shape="buddha">Buddha</button>
                <button data-shape="nebula">Nebula</button>
            </div>
        </div>

        <div class="section">
            <span class="label">Color</span>
            <div class="color-row">
                <input type="color" id="particle-color" value="#00f2ff">
                <span id="color-val">#00f2ff</span>
            </div>
        </div>

        <div class="status">
            <div class="indicator" id="cam-indicator"></div>
            <span id="status-text">Waiting for Camera...</span>
        </div>
    </div>

    <!-- EXTERNAL LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls (Global) -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        /**
         * MAIN APPLICATION LOGIC
         */

        // Configuration
        const CONFIG = {
            count: 15000,
            size: 0.12,
            lerpSpeed: 0.08,
            defaultColor: 0x00f2ff
        };

        // Global State
        let scene, camera, renderer, controls, particles;
        let targetPositions = null; // Float32Array
        let currentShape = 'fireworks';
        let handTension = 0; // 0.0 to 1.0 (Closed to Open)
        let isHandDetected = false;
        let time = 0;

        // --- INITIALIZATION ---
        function init() {
            initThree();
            initParticles();
            initMediaPipe();
            initUI();

            animate();

            // Remove loader
            setTimeout(() => {
                document.getElementById('loader').style.opacity = 0;
                setTimeout(() => document.getElementById('loader').remove(), 500);
            }, 1500);
        }

        function initThree() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            // Fog for depth
            scene.fog = new THREE.FogExp2(0x050505, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Orbit Controls
            if (THREE.OrbitControls) {
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.autoRotate = true;
                controls.autoRotateSpeed = 1.0;
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function initParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(CONFIG.count * 3);
            targetPositions = new Float32Array(CONFIG.count * 3);

            // Initial Layout (Random Sphere)
            for (let i = 0; i < CONFIG.count; i++) {
                const p = getRandomPointInSphere(20);
                positions[i * 3] = p.x;
                positions[i * 3 + 1] = p.y;
                positions[i * 3 + 2] = p.z;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: CONFIG.defaultColor,
                size: CONFIG.size,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthTest: false
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Calculate initial targets
            updateShapeTargets('fireworks');
        }

        // --- SHAPE GENERATORS ---

        function getRandomPointInSphere(radius) {
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = Math.cbrt(Math.random()) * radius;
            return {
                x: r * Math.sin(phi) * Math.cos(theta),
                y: r * Math.sin(phi) * Math.sin(theta),
                z: r * Math.cos(phi)
            };
        }

        function getShapePoint(type, i, count) {
            const u = Math.random();
            const v = Math.random();

            switch (type) {
                case 'fireworks': {
                    // Random explosion
                    return getRandomPointInSphere(15 + Math.random() * 10);
                }
                case 'heart': {
                    // 3D Heart (Modified formula)
                    // x = 16 sin^3 t
                    // y = 13 cos t - 5 cos 2t - 2 cos 3t - cos 4t
                    // z = varied thickness
                    // We use rejection sampling for volume
                    let x, y, z;
                    while (true) {
                        x = (Math.random() * 4 - 2); // -2 to 2
                        y = (Math.random() * 4 - 2); // -2 to 2
                        z = (Math.random() * 4 - 2); // -2 to 2
                        // Heart Formula: (x^2 + 9/4y^2 + z^2 - 1)^3 - x^2z^3 - 9/80y^2z^3 <= 0
                        const x2 = x * x;
                        const y2 = y * y;
                        const z2 = z * z;
                        // Standard formula uses Z as UP, lets swap Y/Z for ThreeJS (Y is up)
                        // (x^2 + 9/4z^2 + y^2 - 1)^3 ...

                        const a = x2 + (9 / 4) * z2 + y2 - 1;
                        if (a * a * a - x2 * y2 * y - (9 / 80) * z2 * y2 * y <= 0) {
                            return { x: x * 8, y: y * 8 + 3, z: z * 8 };
                        }
                        if (Math.random() > 0.99) return { x: 0, y: 0, z: 0 }; // safety break
                    }
                }
                case 'flower': {
                    // 3D rose/flower
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.random() * Math.PI;
                    // Petals
                    const r = 10 + 5 * Math.cos(5 * theta) * Math.sin(3 * phi);

                    return {
                        x: r * Math.sin(phi) * Math.cos(theta),
                        y: r * Math.sin(phi) * Math.sin(theta),
                        z: r * Math.cos(phi)
                    };
                }
                case 'saturn': {
                    // 75% Ring, 25% Planet
                    if (Math.random() > 0.25) {
                        // Ring
                        const angle = Math.random() * Math.PI * 2;
                        const r = 14 + Math.random() * 6; // 14-20
                        return {
                            x: r * Math.cos(angle),
                            y: (Math.random() - 0.5) * 0.5,
                            z: r * Math.sin(angle)
                        };
                    } else {
                        // Planet
                        return getRandomPointInSphere(9);
                    }
                }
                case 'buddha': {
                    // Procedural "Seated Figure"
                    // Weights for body parts
                    const rand = Math.random();

                    if (rand < 0.15) {
                        // Head
                        const p = getRandomPointInSphere(3);
                        return { x: p.x, y: p.y + 7, z: p.z };
                    } else if (rand < 0.55) {
                        // Torso
                        const p = getRandomPointInSphere(5);
                        // Flatten slightly for torso shape, elongate Y
                        return { x: p.x * 1.1, y: p.y * 1.2 + 1, z: p.z * 0.9 };
                    } else {
                        // Legs / Base (Crossed legs approximation)
                        // Wide ellipse at bottom
                        const angle = Math.random() * Math.PI * 2;
                        const r = Math.random() * 7;
                        const height = Math.random() * 4;
                        // Base shape
                        return {
                            x: r * Math.cos(angle) * 1.4,
                            y: (Math.random() * -4) - 2,
                            z: r * Math.sin(angle)
                        };
                    }
                }
                case 'nebula': {
                    // Spiral Galaxy
                    const angle = Math.random() * Math.PI * 8; // 4 turns
                    const r = angle * 0.8 + Math.random() * 2;
                    // Add arms
                    const armOffset = (Math.floor(Math.random() * 3) * (Math.PI * 2 / 3));
                    const finalAngle = angle + armOffset;

                    return {
                        x: r * Math.cos(finalAngle),
                        y: (Math.random() - 0.5) * (10 - r * 0.3), // Thicker at center
                        z: r * Math.sin(finalAngle)
                    };
                }
            }
            return { x: 0, y: 0, z: 0 };
        }

        function updateShapeTargets(type) {
            currentShape = type;
            for (let i = 0; i < CONFIG.count; i++) {
                const p = getShapePoint(type, i, CONFIG.count);
                targetPositions[i * 3] = p.x;
                targetPositions[i * 3 + 1] = p.y;
                targetPositions[i * 3 + 2] = p.z;
            }
        }

        // --- INTERACTION & MEDIAPIPE ---

        function initMediaPipe() {
            const videoElement = document.getElementById('input-video');
            const indicator = document.getElementById('cam-indicator');
            const statusText = document.getElementById('status-text');

            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    isHandDetected = true;

                    // Calculate Tension
                    // Avg distance from Tips to Wrist
                    let totalDist = 0;
                    let handCount = 0;

                    results.multiHandLandmarks.forEach(landmarks => {
                        const wrist = landmarks[0];
                        const tips = [4, 8, 12, 16, 20]; // Fingertips

                        let handAvg = 0;
                        tips.forEach(idx => {
                            const tip = landmarks[idx];
                            const d = Math.sqrt(
                                (tip.x - wrist.x) ** 2 +
                                (tip.y - wrist.y) ** 2 +
                                (tip.z - wrist.z) ** 2
                            );
                            handAvg += d;
                        });
                        totalDist += (handAvg / 5);
                        handCount++;
                    });

                    // Normalizing 
                    // Closed fist ~ 0.15, Open palm ~ 0.4
                    const rawVal = totalDist / handCount;
                    const minVal = 0.15;
                    const maxVal = 0.45;

                    // Map to 0..1
                    let t = (rawVal - minVal) / (maxVal - minVal);
                    handTension = Math.max(0, Math.min(1, t)); // Clamp

                    // Status Update
                    statusText.innerText = "Tracking Hand(s)";
                    statusText.style.color = "#22c55e";
                    indicator.classList.add('active');

                    // Stop auto rotate if interacting
                    if (controls) controls.autoRotate = false;

                } else {
                    isHandDetected = false;
                    statusText.innerText = "No Hands Detected";
                    statusText.style.color = "#64748b";
                    if (isCameraActive) indicator.classList.add('active'); // Still active just no result

                    // Resume auto rotate
                    if (controls) controls.autoRotate = true;
                }
            });

            let isCameraActive = false;
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });

            cameraUtils.start()
                .then(() => {
                    isCameraActive = true;
                    statusText.innerText = "Camera Active - Show Hands";
                })
                .catch(e => {
                    console.error(e);
                    statusText.innerText = "Camera Blocked / Error";
                    indicator.style.backgroundColor = 'orange';
                });
        }

        // --- UI LOGIC ---
        function initUI() {
            // Buttons
            const btns = document.querySelectorAll('#btn-container button');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    btns.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    updateShapeTargets(e.target.dataset.shape);
                });
            });

            // Color
            const picker = document.getElementById('particle-color');
            const label = document.getElementById('color-val');

            picker.addEventListener('input', (e) => {
                const hex = e.target.value;
                particles.material.color.set(hex);
                label.innerText = hex;
            });
        }

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);

            time += 0.01;

            if (controls) controls.update();

            // 1. Calculate Interaction Scale
            // Base scale 1.0
            // Tension 0 (Closed) -> Contract -> 0.4
            // Tension 1 (Open) -> Expand -> 1.8

            let targetScale = 1.0;
            if (isHandDetected) {
                targetScale = 0.4 + (handTension * 1.4);
            } else {
                // Idle breathing
                targetScale = 1.0 + Math.sin(time) * 0.1;
            }

            // Lerp scale for smoothness
            particles.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);

            // 2. Update Particle Positions (Morphing)
            const positions = particles.geometry.attributes.position.array;

            for (let i = 0; i < CONFIG.count; i++) {
                const idx = i * 3;

                // Move towards target
                positions[idx] += (targetPositions[idx] - positions[idx]) * CONFIG.lerpSpeed;
                positions[idx + 1] += (targetPositions[idx + 1] - positions[idx + 1]) * CONFIG.lerpSpeed;
                positions[idx + 2] += (targetPositions[idx + 2] - positions[idx + 2]) * CONFIG.lerpSpeed;

                // Add subtle noise if idle to keep it alive
                if (!isHandDetected) {
                    // positions[idx] += (Math.random()-0.5) * 0.05;
                    // positions[idx+1] += (Math.random()-0.5) * 0.05;
                    // positions[idx+2] += (Math.random()-0.5) * 0.05;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }

        // Start
        init();

    </script>
</body>

</html>
